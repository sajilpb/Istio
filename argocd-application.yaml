apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio-bookinfo
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/sajilpb/Istio.git
    targetRevision: HEAD
    path: Istio
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true   
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
